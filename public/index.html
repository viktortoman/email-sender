<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sender Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#2563eb',
            }
          }
        }
      }
    </script>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans text-gray-800">

<aside class="w-1/3 min-w-[350px] max-w-md bg-white border-r border-gray-200 flex flex-col shadow-xl z-10">

    <div class="p-6 border-b border-gray-100">
        <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
            <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            Email Küldő
        </h1>
        <p class="text-xs text-gray-500 mt-1">Gmail SMTP integráció</p>
    </div>

    <div class="flex-1 overflow-y-auto p-6 space-y-6">

        <div class="space-y-4">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Beállítások</h3>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Küldő (From)</label>
                <select id="senderSelect" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow shadow-sm bg-white">
                    <option value="" disabled selected>Betöltés...</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">HTML Sablon</label>
                    <select id="templateSelect" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow shadow-sm bg-white">
                        <option value="" disabled selected>Betöltés...</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Szöveg Sablon</label>
                    <select id="bodySelect" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow shadow-sm bg-white">
                        <option value="" disabled selected>Betöltés...</option>
                    </select>
                </div>
            </div>
        </div>

        <hr class="border-gray-100">

        <div class="space-y-4">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Címzés</h3>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Címzett (To)</label>
                <input type="email" id="toEmail" placeholder="ugyfel@pelda.hu"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow shadow-sm">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Másolat (CC)</label>
                    <input type="email" id="ccEmail" placeholder="info@ceg.hu"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Titkos másolat (BCC)</label>
                    <input type="email" id="bccEmail" placeholder="archivum@ceg.hu"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow shadow-sm">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tárgy (Subject)</label>
                <input type="text" id="subject" placeholder="Ajánlat megküldése..."
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow shadow-sm">
            </div>

            <div>
                 <label class="block text-sm font-medium text-gray-700 mb-1">Csatolmányok</label>
                 <input type="file" id="fileInput" multiple
                        class="block w-full text-sm text-slate-500
                          file:mr-4 file:py-2 file:px-4
                          file:rounded-full file:border-0
                          file:text-sm file:font-semibold
                          file:bg-violet-50 file:text-violet-700
                          hover:file:bg-violet-100">
            </div>
        </div>

        <hr class="border-gray-100">

        <div class="space-y-4">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Tartalom szerkesztése</h3>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Megszólítás ({{NAME}})</label>
                <input type="text" id="varName" placeholder="Kedves Gábor"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary shadow-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Üzenet szövege ({{BODY}})</label>
                <textarea id="varBody" rows="10" placeholder="Betöltés..."
                          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary shadow-sm resize-y"></textarea>
            </div>
        </div>
    </div>

    <div class="p-6 bg-gray-50 border-t border-gray-200">
        <button id="sendBtn" onclick="sendEmail()"
                class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transform transition active:scale-95 flex justify-center items-center gap-2">
            <span>E-mail Küldése</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </button>
        <div id="statusMsg" class="text-center text-sm font-medium mt-3 h-5"></div>
    </div>
</aside>

<main class="flex-1 flex flex-col bg-gray-100 min-w-0">
    <div class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center shadow-sm">
        <span class="text-sm font-semibold text-gray-600">Élő előnézet (Live Preview)</span>
        <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">HTML Rendered</span>
    </div>

    <div class="flex-1 p-8 overflow-auto flex justify-center items-start">
        <div class="w-full max-w-[800px] h-full bg-white shadow-2xl rounded-sm overflow-hidden border border-gray-200">
            <iframe id="emailPreview" class="w-full h-full" sandbox="allow-same-origin allow-scripts"></iframe>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
