<!DOCTYPE html>
<html lang="hu" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <title>AjándékBár - Sales Email</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style type="text/css">
        body, table, td, a {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        table, td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }
        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }
        body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #f4f6f8;
        }
        /* Prevent iOS blue links */
        a[x-apple-data-detectors] {
            color: inherit !important;
            text-decoration: none !important;
        }
        /* Gmail mobile fix */
        u + #body a {
            color: inherit;
            text-decoration: none;
            font-size: inherit;
            font-weight: inherit;
            line-height: inherit;
        }

        /* ================================================
           SÖTÉT MÓD FIX
           A meta color-scheme jelzi a kliensnek, hogy
           kezeljük magunk a sötét módot — ne invertálja.
           Az !important + specifikus szelektorok felülírják
           az automatikus invertálást Apple Mailben és
           az újabb Outlookban.
        ================================================ */
        @media (prefers-color-scheme: dark) {
            /* Külső háttér */
            body,
            .outer-wrapper,
            .outer-td {
                background-color: #1a1a2e !important;
            }

            /* Email kártya háttere */
            .email-container {
                background-color: #242438 !important;
            }

            /* FEJLÉC: rögzítjük a lila színt, megakadályozzuk az invertálást */
            .logo-cell,
            .logo-cell td {
                background-color: #321C5A !important;
                /* A mso-color-alt Outlookban rögzíti a háttérszínt */
            }

            /* Szövegek */
            .greeting {
                color: #f0f0f0 !important;
            }
            .body-div {
                color: #cccccc !important;
            }
            .signature-text {
                color: #cccccc !important;
            }

            /* Footer */
            .footer-cell {
                background-color: #1e1e30 !important;
                border-top: 1px solid #3a3a5c !important;
            }
            .footer-cell p,
            .footer-cell a {
                color: #aaaaaa !important;
            }
        }

        /* ================================================
           RESZPONZÍV
        ================================================ */
        @media screen and (max-width: 600px) {
            .email-container {
                width: 100% !important;
                max-width: 100% !important;
            }
            .content-cell {
                padding: 25px 18px !important;
            }
            .logo-cell {
                padding: 20px 15px !important;
            }
            .footer-cell {
                padding: 20px 15px !important;
            }
            .body-text {
                font-size: 15px !important;
            }
            .greeting {
                font-size: 19px !important;
            }
        }
    </style>
</head>
<body id="body" style="margin: 0; padding: 0; background-color: #f4f6f8; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">

<!-- Outer wrapper -->
<table
        role="presentation"
        width="100%"
        cellpadding="0"
        cellspacing="0"
        border="0"
        class="outer-wrapper"
        style="background-color: #f4f6f8;"
>
    <tr>
        <td align="center" class="outer-td" style="padding: 30px 10px;">

            <!-- Email container — Outlookban a max-width nem működik,
                 ezért MSO conditional commenttel fix 600px-es wrappert adunk. -->
            <!--[if mso]>
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" align="center">
                <tr><td>
            <![endif]-->

            <table
                    class="email-container"
                    role="presentation"
                    cellpadding="0"
                    cellspacing="0"
                    border="0"
                    style="
                    width: 100%;
                    max-width: 600px;
                    background-color: #ffffff;
                    border-radius: 8px;
                    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                    color: #333333;
                "
            >

                <!-- HEADER / LOGO -->
                <tr>
                    <!--
                        A bgcolor attribútum (nem csak CSS) biztosítja,
                        hogy Outlookban is megjelenjen a háttérszín.
                        Az mso-padding-alt a belső cellapaddingot állítja MSO-ban.
                    -->
                    <td
                            class="logo-cell"
                            align="center"
                            bgcolor="#321C5A"
                            style="
                            padding: 28px 20px;
                            background-color: #321C5A;
                            border-radius: 8px 8px 0 0;
                            mso-padding-alt: 28px 20px;
                        "
                    >
                        <!--[if mso]>
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                            <tr><td align="center" bgcolor="#321C5A" style="background-color:#321C5A; padding:0;">
                        <![endif]-->
                        <img
                                src="https://ajandekbar.hu/assets/icons/mainlogo.svg"
                                alt="AjándékBár"
                                width="200"
                                style="
                                display: block;
                                width: 200px;
                                max-width: 70%;
                                height: auto;
                                margin: 0 auto;
                            "
                        >
                        <!--[if mso]>
                        </td></tr>
                        </table>
                        <![endif]-->
                    </td>
                </tr>

                <!-- MAIN CONTENT -->
                <tr>
                    <td
                            class="content-cell"
                            style="padding: 35px 30px;"
                    >

                        <!-- Megszólítás -->
                        <p
                                class="greeting"
                                style="
                                font-size: 21px;
                                font-weight: bold;
                                color: #111111;
                                margin: 0 0 18px 0;
                                line-height: 1.3;
                                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                            "
                        >{{NAME}}!</p>

                        <!-- Törzs -->
                        <div
                                class="body-div"
                                style="
                                font-size: 16px;
                                line-height: 1.65;
                                color: #333333;
                                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                            "
                        >
                            {{BODY}}
                        </div>

                        <!-- Aláírás -->
                        <p
                                class="signature-text"
                                style="
                                font-size: 16px;
                                color: #333333;
                                margin: 22px 0 0 0;
                                line-height: 1.6;
                                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                            "
                        >
                            Üdvözlettel,<br>
                            <img
                                    src="cid:signature"
                                    alt="Aláírás"
                                    style="
                                    display: block;
                                    max-width: 100%;
                                    height: auto;
                                    margin-top: 8px;
                                "
                            >
                        </p>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td
                            class="footer-cell"
                            align="center"
                            bgcolor="#fafafa"
                            style="
                            padding: 25px 20px;
                            background-color: #fafafa;
                            border-top: 1px solid #eeeeee;
                            border-radius: 0 0 8px 8px;
                            font-size: 13px;
                            color: #888888;
                            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                        "
                    >
                        <p style="margin: 0; line-height: 2;">
                            <a href="https://www.facebook.com/ajandekbar" target="_blank"
                               style="color: #888888; text-decoration: none; font-size: 13px;"
                            >Facebook</a>
                            &nbsp;&nbsp;|&nbsp;&nbsp;
                            <a href="https://www.instagram.com/ajandekbar" target="_blank"
                               style="color: #888888; text-decoration: none; font-size: 13px;"
                            >Instagram</a>
                            &nbsp;&nbsp;|&nbsp;&nbsp;
                            <a href="https://ajandekbar.hu" target="_blank"
                               style="color: #888888; text-decoration: none; font-size: 13px;"
                            >Weboldal</a>
                        </p>
                    </td>
                </tr>

            </table>
            <!-- /email-container -->

            <!--[if mso]>
            </td></tr>
            </table>
            <![endif]-->

        </td>
    </tr>
</table>

</body>
</html>
