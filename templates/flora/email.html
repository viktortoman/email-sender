<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AjándékBár - Sales Email</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style type="text/css">
        /* Gmail strips <style> on mobile, so everything critical is inline too.
           These styles serve desktop webmail and Apple Mail. */
        body, table, td, a {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        table, td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }
        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }
        body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #f4f6f8;
        }
        /* Prevent iOS blue links */
        a[x-apple-data-detectors] {
            color: inherit !important;
            text-decoration: none !important;
        }
        /* Gmail mobile fix */
        u + #body a {
            color: inherit;
            text-decoration: none;
            font-size: inherit;
            font-weight: inherit;
            line-height: inherit;
        }
        @media screen and (max-width: 600px) {
            .email-container {
                width: 100% !important;
                max-width: 100% !important;
            }
            .content-cell {
                padding: 25px 18px !important;
            }
            .logo-cell {
                padding: 20px 15px !important;
            }
            .footer-cell {
                padding: 20px 15px !important;
            }
            .body-text {
                font-size: 15px !important;
            }
            .greeting {
                font-size: 19px !important;
            }
        }
    </style>
</head>
<!-- id="body" szükséges a Gmail u+ selectorhoz -->
<body id="body" style="margin: 0; padding: 0; background-color: #f4f6f8; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">

<!-- Outer wrapper — 100% széles -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f6f8;">
    <tr>
        <td align="center" style="padding: 30px 10px;">

            <!--
                KULCSFONTOSSÁGÚ: Ne adj meg fix width attribútumot itt!
                A max-width CSS-ben van, width="100%" az attribútum.
                Ez biztosítja, hogy mobilon összeszűkül, asztali gépen max 600px.
            -->
            <table
                    class="email-container"
                    role="presentation"
                    cellpadding="0"
                    cellspacing="0"
                    border="0"
                    style="
                    width: 100%;
                    max-width: 600px;
                    background-color: #ffffff;
                    border-radius: 8px;
                    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                    color: #333333;
                "
            >

                <!-- HEADER / LOGO -->
                <tr>
                    <td
                            class="logo-cell"
                            align="center"
                            bgcolor="#321C5A"
                            style="
                            padding: 28px 20px;
                            background-color: #321C5A;
                            border-radius: 8px 8px 0 0;
                        "
                    >
                        <!--
                            Fontos: width attribútum legyen max 280px (mobilon elfér),
                            de ne legyen fix pixel — hadd skálázódjon CSS-sel.
                        -->
                        <img
                                src="https://ajandekbar.hu/assets/icons/mainlogo.svg"
                                alt="AjándékBár"
                                width="200"
                                style="
                                display: block;
                                width: 200px;
                                max-width: 70%;
                                height: auto;
                                margin: 0 auto;
                            "
                        >
                    </td>
                </tr>

                <!-- MAIN CONTENT -->
                <tr>
                    <td
                            class="content-cell"
                            style="padding: 35px 30px;"
                    >

                        <!-- Megszólítás -->
                        <p
                                class="greeting"
                                style="
                                font-size: 21px;
                                font-weight: bold;
                                color: #111111;
                                margin: 0 0 18px 0;
                                line-height: 1.3;
                                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                            "
                        >{{NAME}}!</p>

                        <!-- Törzs szöveg — a {{BODY}} placeholder HTML bekezdéseket tartalmazhat -->
                        <div
                                style="
                                font-size: 16px;
                                line-height: 1.65;
                                color: #333333;
                                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                            "
                        >
                            {{BODY}}
                        </div>

                        <!-- Aláírás blokk -->
                        <p style="
                            font-size: 16px;
                            color: #333333;
                            margin: 22px 0 0 0;
                            line-height: 1.6;
                            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                        ">
                            Üdvözlettel,<br>
                            <img
                                    src="cid:signature"
                                    alt="Aláírás"
                                    style="
                                    display: block;
                                    max-width: 100%;
                                    height: auto;
                                    margin-top: 8px;
                                "
                            >
                        </p>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td
                            class="footer-cell"
                            align="center"
                            bgcolor="#fafafa"
                            style="
                            padding: 25px 20px;
                            background-color: #fafafa;
                            border-top: 1px solid #eeeeee;
                            border-radius: 0 0 8px 8px;
                            font-size: 13px;
                            color: #888888;
                            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                        "
                    >
                        <p style="margin: 0; line-height: 2;">
                            <a href="https://www.facebook.com/ajandekbar" target="_blank"
                               style="color: #888888; text-decoration: none; font-size: 13px;"
                            >Facebook</a>
                            &nbsp;&nbsp;|&nbsp;&nbsp;
                            <a href="https://www.instagram.com/ajandekbar" target="_blank"
                               style="color: #888888; text-decoration: none; font-size: 13px;"
                            >Instagram</a>
                            &nbsp;&nbsp;|&nbsp;&nbsp;
                            <a href="https://ajandekbar.hu" target="_blank"
                               style="color: #888888; text-decoration: none; font-size: 13px;"
                            >Weboldal</a>
                        </p>
                    </td>
                </tr>

            </table>
            <!-- /email-container -->

        </td>
    </tr>
</table>

</body>
</html>
